<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strava Track Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0d0f0e;
    --panel: #121614;
    --border: #1e2422;
    --accent: #fc4c02;
    --accent2: #ffb347;
    --text: #e8ede9;
    --muted: #5a6660;
    --run: #fc4c02;
    --ride: #3b82f6;
    --hike: #22c55e;
    --walk: #a78bfa;
    --ski: #38bdf8;
    --other: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .stats-bar {
    display: flex;
    gap: 20px;
    margin-left: 8px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .stat-val {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .stat-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 8px;
    padding: 10px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
    flex-shrink: 0;
  }

  .search-box {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    width: 180px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  select, input[type="date"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  select:focus, input[type="date"]:focus { border-color: var(--accent); }

  .type-filters {
    display: flex;
    gap: 6px;
  }

  .type-btn {
    padding: 5px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .type-btn.active { color: var(--text); border-color: currentColor; }
  .type-btn[data-type="Run"].active { color: var(--run); }
  .type-btn[data-type="Ride"].active { color: var(--ride); }
  .type-btn[data-type="Hike"].active { color: var(--hike); }
  .type-btn[data-type="Walk"].active { color: var(--walk); }
  .type-btn[data-type="AlpineSki"].active, .type-btn[data-type="NordicSki"].active, .type-btn[data-type="BackcountrySki"].active { color: var(--ski); }

  .mode-btn {
    padding: 5px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    margin-left: auto;
  }

  .mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* MAP */
  #map {
    flex: 1;
    width: 100%;
  }

  /* SIDE PANEL */
  .side-panel {
    position: absolute;
    top: 110px;
    right: 0;
    width: 300px;
    max-height: calc(100vh - 130px);
    background: var(--panel);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    z-index: 50;
    transform: translateX(100%);
    transition: transform 0.25s ease;
  }

  .side-panel.open { transform: translateX(0); }

  .panel-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--accent);
  }

  .close-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
  }

  .panel-body { padding: 14px 16px; }

  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }

  .detail-row:last-child { border-bottom: none; }
  .detail-key { color: var(--muted); }
  .detail-val { color: var(--text); font-weight: 500; }

  /* ACTIVITY LIST */
  .activity-count {
    font-size: 10px;
    color: var(--muted);
    padding: 8px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* LOADING */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    gap: 16px;
  }

  .loading-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    color: var(--accent);
  }

  .loading-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .progress-bar {
    width: 240px;
    height: 2px;
    background: var(--border);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s ease;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  .legend {
    position: absolute;
    bottom: 30px;
    left: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 10px 14px;
    z-index: 50;
    font-size: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px;
    height: 3px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-title">STRAVA MAP</div>
  <div class="spinner"></div>
  <div class="loading-sub" id="loading-msg">Fetching activities...</div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
</div>

<header>
  <div class="logo">STRAVA <span>MAP</span></div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="stat-total">—</div><div class="stat-label">Activities</div></div>
    <div class="stat"><div class="stat-val" id="stat-dist">—</div><div class="stat-label">Total km</div></div>
    <div class="stat"><div class="stat-val" id="stat-elev">—</div><div class="stat-label">Total elev</div></div>
    <div class="stat"><div class="stat-val" id="stat-visible">—</div><div class="stat-label">Visible</div></div>
  </div>
</header>

<div class="controls">
  <input class="search-box" type="text" id="search" placeholder="Search activities...">
  <input type="date" id="date-from" title="From date">
  <input type="date" id="date-to" title="To date">
  <div class="type-filters" id="type-filters"></div>
  <button class="mode-btn" id="heatmap-btn" onclick="toggleHeatmap()">Heatmap</button>
</div>

<div class="activity-count" id="activity-count"></div>

<div id="map"></div>

<div class="side-panel" id="side-panel">
  <div class="panel-header">
    <div class="panel-title" id="panel-title">Activity</div>
    <button class="close-btn" onclick="closePanel()">×</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<div class="legend" id="legend"></div>

<script>
const CLIENT_ID = '148064';
const CLIENT_SECRET = '96b45e4fc22e3ca79ec7fb9e25ab987e3d82a22d';
const REFRESH_TOKEN = 'c656e51b2611302fd9df5f20476f931095694f8c';

const TYPE_COLORS = {
  Run: '#fc4c02', Ride: '#3b82f6', Hike: '#22c55e', Walk: '#a78bfa',
  AlpineSki: '#38bdf8', NordicSki: '#38bdf8', BackcountrySki: '#38bdf8',
  VirtualRide: '#3b82f6', TrailRun: '#fc4c02', Workout: '#f59e0b',
  WeightTraining: '#f59e0b', Yoga: '#f59e0b', Swim: '#06b6d4',
  default: '#f59e0b'
};

const TYPE_GROUPS = {
  Run: ['Run', 'TrailRun', 'VirtualRun'],
  Ride: ['Ride', 'VirtualRide', 'MountainBikeRide'],
  Hike: ['Hike'],
  Walk: ['Walk'],
  Ski: ['AlpineSki', 'NordicSki', 'BackcountrySki'],
  Other: ['Workout', 'WeightTraining', 'Yoga', 'Swim']
};

let map, heatmapLayer;
let allActivities = [];
let polylines = [];
let activeTypes = new Set(Object.keys(TYPE_GROUPS));
let heatmapMode = false;
let accessToken = null;

async function getAccessToken() {
  const params = new URLSearchParams();
  params.append('client_id', CLIENT_ID);
  params.append('client_secret', CLIENT_SECRET);
  params.append('refresh_token', REFRESH_TOKEN);
  params.append('grant_type', 'refresh_token');

  const res = await fetch('https://www.strava.com/oauth/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: params
  });
  const data = await res.json();
  if (!data.access_token) throw new Error('Token refresh failed: ' + JSON.stringify(data));
  return data.access_token;
}

async function fetchAllActivities(token) {
  let page = 1, all = [];
  while (true) {
    const res = await fetch(
      `https://www.strava.com/api/v3/athlete/activities?per_page=100&page=${page}`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    const data = await res.json();
    if (!data.length) break;
    all = all.concat(data);
    setProgress(Math.min(40, all.length / 10));
    page++;
  }
  return all;
}

async function fetchStream(token, id) {
  try {
    const res = await fetch(
      `https://www.strava.com/api/v3/activities/${id}/streams?keys=latlng&key_by_type=true`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    const data = await res.json();
    return data.latlng?.data || null;
  } catch { return null; }
}

function setProgress(pct) {
  document.getElementById('progress').style.width = pct + '%';
}

function setMsg(msg) {
  document.getElementById('loading-msg').textContent = msg;
}

function getTypeGroup(type) {
  for (const [group, types] of Object.entries(TYPE_GROUPS)) {
    if (types.includes(type)) return group;
  }
  return 'Other';
}

function getColor(type) {
  return TYPE_COLORS[type] || TYPE_COLORS.default;
}

function formatDuration(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function formatDate(str) {
  return new Date(str).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function buildTypeFilters() {
  const container = document.getElementById('type-filters');
  const legend = document.getElementById('legend');
  container.innerHTML = '';
  legend.innerHTML = '';

  for (const [group, types] of Object.entries(TYPE_GROUPS)) {
    const color = TYPE_COLORS[types[0]] || TYPE_COLORS.default;
    const btn = document.createElement('button');
    btn.className = 'type-btn active';
    btn.dataset.type = types[0];
    btn.dataset.group = group;
    btn.textContent = group;
    btn.style.color = color;
    btn.style.borderColor = color;
    btn.onclick = () => toggleType(group, btn);
    container.appendChild(btn);

    const li = document.createElement('div');
    li.className = 'legend-item';
    li.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${group}`;
    legend.appendChild(li);
  }
}

function toggleType(group, btn) {
  if (activeTypes.has(group)) {
    activeTypes.delete(group);
    btn.classList.remove('active');
    btn.style.opacity = '0.35';
  } else {
    activeTypes.add(group);
    btn.classList.add('active');
    btn.style.opacity = '1';
  }
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  const from = document.getElementById('date-from').value;
  const to = document.getElementById('date-to').value;

  let visible = 0;
  const heatPoints = [];

  polylines.forEach(({ polyline, activity, path }) => {
    const group = getTypeGroup(activity.type);
    const dateStr = activity.start_date_local?.substring(0, 10) || '';
    const nameMatch = activity.name.toLowerCase().includes(search);
    const typeMatch = activeTypes.has(group);
    const fromMatch = !from || dateStr >= from;
    const toMatch = !to || dateStr <= to;
    const show = nameMatch && typeMatch && fromMatch && toMatch;

    polyline.setVisible(show && !heatmapMode);
    if (show) {
      visible++;
      if (heatmapMode && path) path.forEach(p => heatPoints.push(new google.maps.LatLng(p[0], p[1])));
    }
  });

  if (heatmapMode && heatmapLayer) {
    heatmapLayer.setData(heatPoints);
  }

  document.getElementById('stat-visible').textContent = visible;
  document.getElementById('activity-count').textContent = `${visible} activities shown`;
}

function toggleHeatmap() {
  heatmapMode = !heatmapMode;
  const btn = document.getElementById('heatmap-btn');
  btn.classList.toggle('active', heatmapMode);
  document.getElementById('legend').style.display = heatmapMode ? 'none' : 'block';

  if (heatmapMode) {
    if (!heatmapLayer) {
      heatmapLayer = new google.maps.visualization.HeatmapLayer({
        map, radius: 8, opacity: 0.7,
        gradient: ['rgba(0,0,0,0)', '#fc4c02', '#ffb347', '#ffffff']
      });
    } else {
      heatmapLayer.setMap(map);
    }
  } else {
    if (heatmapLayer) heatmapLayer.setMap(null);
  }

  applyFilters();
}

function showActivityPanel(activity) {
  const panel = document.getElementById('side-panel');
  document.getElementById('panel-title').textContent = activity.name;

  const rows = [
    ['Date', formatDate(activity.start_date_local)],
    ['Type', activity.type],
    ['Distance', activity.distance ? (activity.distance / 1000).toFixed(2) + ' km' : '—'],
    ['Moving Time', activity.moving_time ? formatDuration(activity.moving_time) : '—'],
    ['Elevation', activity.total_elevation_gain ? activity.total_elevation_gain + ' m' : '—'],
    ['Avg Speed', activity.average_speed ? (activity.average_speed * 3.6).toFixed(1) + ' km/h' : '—'],
    ['Avg HR', activity.average_heartrate ? activity.average_heartrate + ' bpm' : '—'],
    ['Max HR', activity.max_heartrate ? activity.max_heartrate + ' bpm' : '—'],
    ['Calories', activity.calories || '—'],
    ['Suffer Score', activity.suffer_score || '—'],
    ['Kudos', activity.kudos_count ?? '—'],
  ];

  document.getElementById('panel-body').innerHTML = rows.map(([k, v]) =>
    `<div class="detail-row"><span class="detail-key">${k}</span><span class="detail-val">${v}</span></div>`
  ).join('');

  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('side-panel').classList.remove('open');
}

async function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 63.4, lng: 10.4 },
    zoom: 6,
    mapTypeId: 'roadmap',
    styles: [
      { elementType: 'geometry', stylers: [{ color: '#0d0f0e' }] },
      { elementType: 'labels.text.fill', stylers: [{ color: '#5a6660' }] },
      { elementType: 'labels.text.stroke', stylers: [{ color: '#0d0f0e' }] },
      { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#1e2422' }] },
      { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#252e2a' }] },
      { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#0a1612' }] },
      { featureType: 'landscape', elementType: 'geometry', stylers: [{ color: '#111511' }] },
      { featureType: 'poi', stylers: [{ visibility: 'off' }] },
      { featureType: 'transit', stylers: [{ visibility: 'off' }] },
      { featureType: 'administrative', elementType: 'geometry.stroke', stylers: [{ color: '#1e2422' }] },
      { featureType: 'administrative.country', elementType: 'labels.text.fill', stylers: [{ color: '#3a4440' }] },
    ]
  });

  buildTypeFilters();

  setMsg('Authenticating...');
  try {
    accessToken = await getAccessToken();
  } catch(e) {
    setMsg('Auth failed: ' + e.message);
    console.error(e);
    return;
  }

  setMsg('Loading activities...');
  try {
    allActivities = await fetchAllActivities(accessToken);
  } catch(e) {
    setMsg('Failed to load activities: ' + e.message);
    console.error(e);
    return;
  }

  // Update stats
  const totalDist = allActivities.reduce((s, a) => s + (a.distance || 0), 0) / 1000;
  const totalElev = allActivities.reduce((s, a) => s + (a.total_elevation_gain || 0), 0);
  document.getElementById('stat-total').textContent = allActivities.length;
  document.getElementById('stat-dist').textContent = Math.round(totalDist).toLocaleString();
  document.getElementById('stat-elev').textContent = Math.round(totalElev / 1000) + 'k m';
  document.getElementById('stat-visible').textContent = allActivities.length;
  document.getElementById('activity-count').textContent = `${allActivities.length} activities shown`;

  setMsg(`Fetching GPS tracks (${allActivities.length} activities)...`);
  setProgress(40);

  // Filter to activities with GPS
  const gpsActivities = allActivities.filter(a => a.map?.summary_polyline);
  let done = 0;

  for (const activity of gpsActivities) {
    const encoded = activity.map.summary_polyline;
    if (!encoded) { done++; continue; }

    // Decode polyline
    const path = decodePolyline(encoded);
    if (!path.length) { done++; continue; }

    const color = getColor(activity.type);
    const polyline = new google.maps.Polyline({
      path: path.map(([lat, lng]) => ({ lat, lng })),
      geodesic: true,
      strokeColor: color,
      strokeOpacity: 0.7,
      strokeWeight: 2,
      map
    });

    polyline.addListener('click', () => showActivityPanel(activity));
    polyline.addListener('mouseover', () => polyline.setOptions({ strokeOpacity: 1, strokeWeight: 3.5 }));
    polyline.addListener('mouseout', () => polyline.setOptions({ strokeOpacity: 0.7, strokeWeight: 2 }));

    polylines.push({ polyline, activity, path });
    done++;
    setProgress(40 + (done / gpsActivities.length) * 58);
  }

  setProgress(100);

  // Setup filter listeners
  document.getElementById('search').addEventListener('input', applyFilters);
  document.getElementById('date-from').addEventListener('change', applyFilters);
  document.getElementById('date-to').addEventListener('change', applyFilters);

  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
  }, 400);
}

function decodePolyline(encoded) {
  const points = [];
  let index = 0, lat = 0, lng = 0;
  while (index < encoded.length) {
    let b, shift = 0, result = 0;
    do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lat += (result & 1) ? ~(result >> 1) : result >> 1;
    shift = 0; result = 0;
    do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lng += (result & 1) ? ~(result >> 1) : result >> 1;
    points.push([lat / 1e5, lng / 1e5]);
  }
  return points;
}

window.toggleHeatmap = toggleHeatmap;
window.closePanel = closePanel;
</script>

<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBuLpsIsu12L5T1g5WWEYUprZ1HnIKGgHU&libraries=visualization&callback=initMap">
</script>

</body>
</html>
